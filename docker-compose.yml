services:
  sftp:
    image: linuxserver/openssh-server
    container_name: "${CONT_NAME}"
    ports:
      - "${HOST_PORT}:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - USER_NAME=${USER_NAME}
      - USER_PASSWORD=${USER_PASS}
      - PASSWORD_ACCESS=true
    volumes:
      - ./share:/config/dropins
    restart: always
